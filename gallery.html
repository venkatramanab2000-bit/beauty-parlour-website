<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <button class="prev" onclick="changeImage(-1)">&#10094;</button>
    <img id="lightbox-img">
    <button class="next" onclick="changeImage(1)">&#10095;</button>
</div>

<footer class="footer">
    <p>© 2026 Marvelous Beauty Parlour. All rights reserved.</p>
</footer>

<script>
let currentIndex = 0;
let filteredImages = [];

function filterGallery(category) {
    const items = document.querySelectorAll('.gallery-item');
    const buttons = document.querySelectorAll('.gallery-buttons button');

    // Highlight active button
    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    // Filter images
    items.forEach(item => {
        if (category === "all" || item.classList.contains(category)) {
            item.style.display = "block";
        } else {
            item.style.display = "none";
        }
    });
}

function openLightbox(imgElement) {
    const visibleImages = document.querySelectorAll('.gallery-item img');
    filteredImages = Array.from(visibleImages).filter(img =>
        img.parentElement.style.display !== "none"
    );

    currentIndex = filteredImages.indexOf(imgElement);

    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = imgElement.src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function changeImage(direction) {
    currentIndex += direction;

    if (currentIndex < 0) {
        currentIndex = filteredImages.length - 1;
    }

    if (currentIndex >= filteredImages.length) {
        currentIndex = 0;
    }

    document.getElementById("lightbox-img").src = filteredImages[currentIndex].src;
}
window.onload = function() {
    filterGallery('all');
    document.querySelector('.gallery-buttons button:last-child').classList.add('active');
};
</script>
